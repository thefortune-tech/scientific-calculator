name: scientific_calculator
description: "A professional scientific calculator mobile app built with Flutter — Clean Architecture, BLoC, GoRouter, and Hive."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  uuid: ^4.4.0
  go_router: ^14.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  math_expressions: ^2.4.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  get_it: ^7.7.0
  injectable: ^2.4.4
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  mocktail: ^1.0.4

flutter:
  uses-material-design: true